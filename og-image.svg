<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <!-- bg -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0000"/>
      <stop offset=".45" stop-color="#160000"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e10600" stop-opacity="0"/>
      <stop offset=".5" stop-color="#ff3a30"/>
      <stop offset="1" stop-color="#e10600" stop-opacity="0"/>
    </linearGradient>
    <pattern id="speedlines" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <rect width="80" height="80" fill="transparent"/>
      <rect x="0" y="0" width="2" height="80" fill="#e10600" opacity=".06"/>
    </pattern>
  </defs>

  <!-- background layers -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#speedlines)"/>

  <!-- bottom red border -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#redLine)"/>

  <!-- checkered flag accent (top right) -->
  <g transform="translate(960,40)">
    <g fill="#fff" opacity=".12">
      <rect x="0"  y="0"  width="24" height="24"/>
      <rect x="48" y="0"  width="24" height="24"/>
      <rect x="96" y="0"  width="24" height="24"/>
      <rect x="144" y="0"  width="24" height="24"/>
      <rect x="24" y="24" width="24" height="24"/>
      <rect x="72" y="24" width="24" height="24"/>
      <rect x="120" y="24" width="24" height="24"/>
      <rect x="168" y="24" width="24" height="24"/>
      <rect x="0"  y="48" width="24" height="24"/>
      <rect x="48" y="48" width="24" height="24"/>
      <rect x="96" y="48" width="24" height="24"/>
      <rect x="144" y="48" width="24" height="24"/>
    </g>
  </g>

  <!-- eyebrow -->
  <text x="80" y="180" fill="#e10600" font-family="DM Mono,monospace" font-size="20" letter-spacing="8" font-weight="700">FIA FORMULA ONE WORLD CHAMPIONSHIP</text>

  <!-- main title -->
  <text x="80" y="320" fill="#fff" font-family="Bebas Neue,Impact,sans-serif" font-size="180" letter-spacing="6" font-weight="900">F1
    <tspan fill="#e10600"> 2026</tspan>
  </text>

  <!-- subtitle -->
  <text x="80" y="380" fill="#a0a0a0" font-family="DM Sans,sans-serif" font-size="28" font-weight="400">Live standings · race results · weekend times in your local timezone</text>

  <!-- stats row -->
  <g transform="translate(80,470)" font-family="Bebas Neue,Impact,sans-serif" fill="#fff">
    <g>
      <text x="0" y="0" font-size="62" letter-spacing="2">22</text>
      <text x="0" y="32" font-family="DM Mono,monospace" font-size="14" fill="#666" letter-spacing="3">ROUNDS</text>
    </g>
    <g transform="translate(180,0)">
      <text x="0" y="0" font-size="62" fill="#22c55e" letter-spacing="2">4</text>
      <text x="0" y="32" font-family="DM Mono,monospace" font-size="14" fill="#666" letter-spacing="3">COMPLETE</text>
    </g>
    <g transform="translate(340,0)">
      <text x="0" y="0" font-size="62" fill="#7c3aed" letter-spacing="2">18</text>
      <text x="0" y="32" font-family="DM Mono,monospace" font-size="14" fill="#666" letter-spacing="3">REMAINING</text>
    </g>
    <g transform="translate(540,0)">
      <text x="0" y="0" font-size="62" letter-spacing="2">11</text>
      <text x="0" y="32" font-family="DM Mono,monospace" font-size="14" fill="#666" letter-spacing="3">TEAMS</text>
    </g>
  </g>

  <!-- top-right URL chip -->
  <g transform="translate(980,560)">
    <rect x="0" y="0" width="180" height="34" rx="4" fill="rgba(225,6,0,.12)" stroke="rgba(225,6,0,.5)" stroke-width="1"/>
    <text x="90" y="22" text-anchor="middle" fill="#e10600" font-family="DM Mono,monospace" font-size="13" font-weight="700" letter-spacing="2">f1-2026.live</text>
  </g>
</svg>
